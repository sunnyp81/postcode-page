name: Scheduled rebuild

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deployment
        run: |
          curl -s -X POST             "https://api.cloudflare.com/client/v4/accounts/aba0a6722a4510842ca473315a8ba13e/pages/projects/postcode-page/deployments"             -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}"             -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}"
